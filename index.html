<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Family Scorekeeper</title>
<meta name="theme-color" content="#1E4B3D">
<meta name="apple-mobile-web-app-title" content="Scorekeeper">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png?v=2">
<link rel="icon" href="icons/icon-192.png?v=2">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app"></div>

<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/engine.js"></script>
<script src="js/ui.js"></script>
<script src="js/controllers.js"></script>
<script src="js/app.js"></script>
<script>
  App.init();
  if ('serviceWorker' in navigator) {
    const hadController = !!navigator.serviceWorker.controller;
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
    // Only show the "update available" banner when the page was already
    // being controlled by a service worker (a genuine update) — not on a
    // fresh install, where this event also fires once but there's nothing
    // to refresh into.
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (hadController) UI.showUpdateBanner();
    });
  }
</script>
</body>
</html>
